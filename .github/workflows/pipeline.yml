name: Bolão F1 — pipeline

on:
  # Disparado pelo Apps Script (Etapa 6): novo palpite colado no Forms.
  repository_dispatch:
    types: [novo_palpite]
  # Re-tentativa manual: quali ainda não tinha resultado na Jolpica quando o
  # palpite foi enviado (mensagem já está gravada, só falta buscar e pontuar).
  workflow_dispatch:
    inputs:
      round:
        description: "Rodada para re-tentar buscar resultado (ex.: 10)"
        required: true

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Roda pipeline (novo palpite)
        if: github.event_name == 'repository_dispatch'
        env:
          TEXTO: ${{ github.event.client_payload.texto }}
          ROUND: ${{ github.event.client_payload.round }}
        run: |
          if [ -n "$ROUND" ]; then
            printf '%s' "$TEXTO" | python -m bolao.pipeline run --round "$ROUND"
          else
            printf '%s' "$TEXTO" | python -m bolao.pipeline run
          fi

      - name: Roda pipeline (retry manual)
        if: github.event_name == 'workflow_dispatch'
        run: python -m bolao.pipeline retry "${{ github.event.inputs.round }}"

      - name: Commit e push dos dados atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data docs/data
          if git diff --cached --quiet; then
            echo "Nada para commitar."
            exit 0
          fi
          ARQ=$(git diff --cached --name-only | grep -E 'messages/[0-9]+\.txt$' | head -n1 || true)
          RODADA=$(basename "${ARQ:-}" .txt 2>/dev/null || true)
          MSG="Etapa 5: atualiza dados via Actions"
          if [ -n "$RODADA" ]; then
            MSG="$MSG (rodada $RODADA)"
          fi
          git commit -m "$MSG

          Co-Authored-By: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          git push
